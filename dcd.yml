version: '3.8'

services:
  # Simple DICOMweb Server (Python-based, no external images)
  dicom-server:
    image: casewise-v2-dicom-server:latest
    container_name: dicom-server
    ports:
      - "8042:8042"
    volumes:
      - ./cases:/app/cases
      - ./demo_cases:/app/demo_cases
      - ./simple-dicom-server.py:/app/simple-dicom-server.py
    environment:
      - PYTHONPATH=/app
    command: ["python", "simple-dicom-server.py"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8042/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Development service with hot reload
  casewise-dev:
    image: casewise-v2-casewise-dev:latest
    container_name: casewise-dev
    ports:
      - "8001:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - MODEL_NAME=${MODEL_NAME:-gpt-4o}
      - CASES_DIR=${CASES_DIR:-cases}
      - RUBRICS_DIR=${RUBRICS_DIR:-rubrics}
      - DEBUG=${DEBUG:-true}
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
    volumes:
      - ./rubrics:/app/rubrics
      - ./cases:/app/cases
      - ./source-documents:/app/source-documents
      - ./logs:/app/logs
      - ./output:/app/output
      - ./demo_cases:/app/demo_cases
    restart: unless-stopped
    command: ["python", "-m", "uvicorn", "casewise.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  # OHIF Viewer Server
  ohif-viewer:
    image: nginx:alpine
    container_name: ohif-viewer
    ports:
      - "8081:80"
    volumes:
      - ./ohif-viewers/platform/app/dist:/usr/share/nginx/html:ro
    depends_on:
      - dicom-server
    restart: unless-stopped

  # Frontend Development Server (starts last)
  frontend:
    image: casewise-v2-frontend:latest
    container_name: frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    restart: unless-stopped
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"] 